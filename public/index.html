<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>suuu — your friendly neighborhood agent</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕷️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0e1226; --ink2:#161c3a; --paper:#f4f1ea;
  --red:#ff2d4d; --blue:#2c5cff; --cyan:#22e0ff; --yellow:#ffd52b;
  --display:'Archivo Black',system-ui,sans-serif;
  --body:'Space Grotesk',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--ink); color:var(--paper); font-family:var(--body);
  overflow:hidden;
}
/* halftone + diagonal energy panels */
body::before{
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(circle at 8% 12%, rgba(255,45,77,.22), transparent 34%),
    radial-gradient(circle at 92% 88%, rgba(44,92,255,.25), transparent 40%),
    radial-gradient(circle at 80% 6%, rgba(255,213,43,.10), transparent 30%);
}
body::after{
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.13;
  background-image:radial-gradient(rgba(244,241,234,.9) 1px, transparent 1.4px);
  background-size:14px 14px;
}

/* ---------- marquee ---------- */
.marquee{
  position:fixed; top:0; left:0; right:0; z-index:5;
  background:var(--red); color:var(--ink); overflow:hidden;
  font-family:var(--display); font-size:12px; letter-spacing:.14em;
  padding:7px 0; text-transform:uppercase;
  border-bottom:3px solid var(--ink);
}
.marquee-track{display:inline-flex; white-space:nowrap; animation:slide 26s linear infinite}
.marquee-track span{padding:0 1.6em}
@keyframes slide{to{transform:translateX(-50%)}}

/* ---------- boot overlay ---------- */
#boot{
  position:fixed; inset:0; z-index:50; background:var(--ink);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:28px;
}
#boot .letters{display:flex; font-family:var(--display); font-size:clamp(90px,22vw,260px); line-height:.9}
#boot .letters b{display:inline-block; font-weight:400}
#boot .letters b:nth-child(1){color:var(--red)}
#boot .letters b:nth-child(2){color:var(--paper)}
#boot .letters b:nth-child(3){color:var(--cyan)}
#boot .letters b:nth-child(4){color:var(--yellow)}
#boot .tag{font-size:clamp(13px,2vw,17px); letter-spacing:.28em; text-transform:uppercase; opacity:.75}
#wake{
  font-family:var(--display); font-size:clamp(16px,2.4vw,22px); letter-spacing:.06em;
  background:var(--yellow); color:var(--ink); border:4px solid var(--ink);
  box-shadow:8px 8px 0 var(--red); padding:16px 40px; cursor:pointer;
  transform:rotate(-2deg); transition:box-shadow .15s, transform .15s;
}
#wake:hover{box-shadow:12px 12px 0 var(--blue); transform:rotate(1deg) scale(1.04)}
#wake:active{box-shadow:2px 2px 0 var(--red); transform:scale(.97)}

/* ---------- app ---------- */
#app{
  position:relative; z-index:1; height:100%; padding-top:34px;
  display:grid; grid-template-columns:minmax(300px,42%) 1fr;
  opacity:0;
}
@media (max-width:820px){
  #app{grid-template-columns:1fr; grid-template-rows:38% 1fr}
  body{overflow:auto}
}

/* left — the entity */
#stage{
  position:relative; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:14px;
  border-right:3px solid rgba(244,241,234,.12);
}
#web{width:min(78%,440px); aspect-ratio:1; display:block}
.h1{
  font-family:var(--display); font-size:clamp(34px,4.6vw,58px); line-height:.95;
  text-align:center; text-transform:uppercase;
}
.h1 em{font-style:normal; color:var(--red); -webkit-text-stroke:0}
.status{
  display:flex; align-items:center; gap:9px; font-size:12.5px; letter-spacing:.12em;
  text-transform:uppercase; border:2px solid rgba(244,241,234,.25);
  padding:7px 14px; border-radius:99px; background:rgba(14,18,38,.6);
}
.status .dot{width:9px;height:9px;border-radius:50%;background:var(--yellow)}
.status.ok .dot{background:#3ef08c; box-shadow:0 0 10px #3ef08c}
.status.bad .dot{background:var(--red)}
#gear{
  position:absolute; bottom:16px; left:16px; background:none; border:2px solid rgba(244,241,234,.3);
  color:var(--paper); font-family:var(--body); font-size:12px; letter-spacing:.1em;
  padding:7px 13px; cursor:pointer; text-transform:uppercase; border-radius:99px;
}
#gear:hover{border-color:var(--cyan); color:var(--cyan)}

/* right — chat */
#chat{display:flex; flex-direction:column; min-height:0}
#feed{
  flex:1; overflow-y:auto; padding:34px clamp(18px,4vw,56px) 20px;
  display:flex; flex-direction:column; gap:22px; scroll-behavior:smooth;
}
#feed::-webkit-scrollbar{width:5px}
#feed::-webkit-scrollbar-thumb{background:var(--blue)}
.msg{max-width:72ch}
.msg .who{
  font-family:var(--display); font-size:11px; letter-spacing:.2em;
  text-transform:uppercase; margin-bottom:7px;
}
.msg.user{align-self:flex-end; text-align:right}
.msg.user .who{color:var(--yellow)}
.msg.user .body{
  display:inline-block; background:var(--blue); color:#fff; padding:13px 18px;
  border:3px solid var(--ink); box-shadow:5px 5px 0 rgba(0,0,0,.45);
  transform:rotate(.4deg); font-size:16px; line-height:1.5;
}
.msg.suuu .who{color:var(--red)}
.msg.suuu .body{font-size:clamp(16px,1.6vw,19px); line-height:1.65; white-space:pre-wrap}
.msg.suuu .body .w{display:inline-block; opacity:0; transform:translateY(.45em)}
.msg.err .body{color:var(--red); font-size:14px}
.think{display:inline-flex; gap:6px; padding:6px 2px}
.think i{width:8px;height:8px;border-radius:50%;background:var(--red);animation:jump .9s infinite}
.think i:nth-child(2){background:var(--cyan);animation-delay:.15s}
.think i:nth-child(3){background:var(--yellow);animation-delay:.3s}
@keyframes jump{0%,100%{transform:translateY(0)}40%{transform:translateY(-9px)}}

#bar{
  display:flex; gap:12px; padding:18px clamp(18px,4vw,56px) 26px;
  border-top:3px solid rgba(244,241,234,.12); background:rgba(14,18,38,.7);
}
#inp{
  flex:1; background:var(--ink2); border:3px solid rgba(244,241,234,.2);
  color:var(--paper); font-family:var(--body); font-size:16px; padding:15px 18px;
  outline:none; resize:none; line-height:1.4; max-height:140px;
}
#inp:focus{border-color:var(--cyan)}
#send{
  font-family:var(--display); font-size:16px; background:var(--red); color:var(--paper);
  border:3px solid var(--ink); box-shadow:5px 5px 0 rgba(0,0,0,.5);
  padding:0 26px; cursor:pointer; letter-spacing:.05em; white-space:nowrap;
}
#send:hover{background:var(--yellow); color:var(--ink)}
#send:active{box-shadow:1px 1px 0 rgba(0,0,0,.5); transform:translate(3px,3px)}
#send:disabled{opacity:.45; cursor:wait}

/* settings drawer */
#drawer{
  position:fixed; inset:0; z-index:40; background:rgba(10,12,28,.82);
  display:none; align-items:center; justify-content:center;
}
#drawer.open{display:flex}
#drawer .card{
  background:var(--ink2); border:4px solid var(--yellow); box-shadow:12px 12px 0 rgba(0,0,0,.5);
  padding:32px; width:min(480px,92vw);
}
#drawer h2{font-family:var(--display); font-size:22px; margin-bottom:6px}
#drawer p{font-size:13.5px; opacity:.8; line-height:1.6; margin-bottom:16px}
#drawer input{
  width:100%; background:var(--ink); border:2px solid rgba(244,241,234,.25);
  color:var(--paper); font-family:var(--body); padding:12px 14px; font-size:14px; outline:none;
}
#drawer input:focus{border-color:var(--cyan)}
#drawer .row{display:flex; gap:10px; margin-top:18px}
#drawer button{
  font-family:var(--display); font-size:13px; padding:11px 20px; cursor:pointer;
  border:3px solid var(--ink); letter-spacing:.05em;
}
#saveKey{background:var(--cyan); color:var(--ink)}
#clearKey{background:transparent; color:var(--paper); border-color:rgba(244,241,234,.35)}

@media (prefers-reduced-motion: reduce){
  .marquee-track{animation:none}
  .think i{animation:none}
}
</style>
</head>
<body>

<div class="marquee"><div class="marquee-track" id="mtrack"></div></div>

<div id="boot">
  <div class="letters"><b>s</b><b>u</b><b>u</b><b>u</b></div>
  <div class="tag">your friendly neighborhood agent</div>
  <button id="wake">WAKE HIM UP</button>
</div>

<div id="app">
  <section id="stage">
    <canvas id="web"></canvas>
    <div class="h1">SUUU IS <em id="state-word">AWAKE</em></div>
    <div class="status" id="status"><span class="dot"></span><span id="status-txt">linking…</span></div>
    <button id="gear">key optional ⚙</button>
  </section>

  <section id="chat">
    <div id="feed"></div>
    <div id="bar">
      <textarea id="inp" rows="1" placeholder="talk to him…"></textarea>
      <button id="send">THWIP →</button>
    </div>
  </section>
</div>

<div id="drawer">
  <div class="card">
    <h2>API KEY — OPTIONAL</h2>
    <p>suuu already runs on your <b>Claude Code login</b> — no key needed.
       Paste an Anthropic API key only if you want the site to work
       without Claude Code (e.g. hosted for someone else). Stored in this
       browser only.</p>
    <input id="keyInp" type="password" placeholder="sk-ant-…">
    <div class="row">
      <button id="saveKey">SAVE</button>
      <button id="clearKey">USE CLAUDE CODE (NO KEY)</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script>
const $ = (s) => document.querySelector(s);
const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;
const hasGsap = typeof gsap !== "undefined";

/* marquee */
const items = "FRIENDLY NEIGHBORHOOD AGENT · NO API KEY NEEDED · POWERED BY YOUR CLAUDE · HONEST BEFORE NICE · THWIP · MADE WITH WEBS, NOT TEMPLATES · ";
$("#mtrack").textContent = (items + items).trim();

/* ---------------- the entity: a living spider-web orb ---------------- */
const cv = $("#web"), ctx = cv.getContext("2d");
let W, H, C, R;
function size(){
  const r = cv.getBoundingClientRect();
  W = cv.width = r.width * devicePixelRatio;
  H = cv.height = r.height * devicePixelRatio;
  C = { x: W/2, y: H/2 }; R = Math.min(W,H) * .42;
}
addEventListener("resize", size);

const RINGS = 5, SPOKES = 14;
let nodes = [];
function buildWeb(){
  nodes = [];
  for (let r = 1; r <= RINGS; r++){
    for (let s = 0; s < SPOKES; s++){
      const a = (s/SPOKES) * Math.PI*2;
      const rad = R * (r/RINGS);
      nodes.push({ a, rad, r, s, x:0, y:0, jx:0, jy:0 });
    }
  }
}
let mood = "idle";           // idle | thinking | speaking
let energy = 0;              // eases toward mood target
const moodColor = { idle:"#22e0ff", thinking:"#ff2d4d", speaking:"#ffd52b" };
let curColor = moodColor.idle;
let mouse = { x:.5, y:.5 };
addEventListener("mousemove", e => { mouse.x = e.clientX/innerWidth; mouse.y = e.clientY/innerHeight; });

let t = 0;
function tick(){
  t += reduced ? 0 : .016;
  const target = mood === "thinking" ? 1 : mood === "speaking" ? .55 : .18;
  energy += (target - energy) * .05;

  // node positions: breathing + jitter scaled by energy
  const breathe = 1 + Math.sin(t*1.4)*.02*(1+energy);
  for (const n of nodes){
    const jit = energy * R * .035;
    n.jx += ((Math.random()-.5)*jit - n.jx) * .2;
    n.jy += ((Math.random()-.5)*jit - n.jy) * .2;
    const wob = Math.sin(t*2 + n.r + n.s) * R * .012 * (1+energy*2);
    const rad = n.rad * breathe + wob;
    n.x = C.x + Math.cos(n.a + Math.sin(t*.3)*.03) * rad + n.jx;
    n.y = C.y + Math.sin(n.a + Math.sin(t*.3)*.03) * rad + n.jy;
  }

  ctx.clearRect(0,0,W,H);
  ctx.lineWidth = Math.max(1, R*.006);

  // web rings + spokes
  ctx.strokeStyle = curColor + "55";
  for (let r = 0; r < RINGS; r++){
    ctx.beginPath();
    for (let s = 0; s <= SPOKES; s++){
      const n = nodes[r*SPOKES + (s % SPOKES)];
      s === 0 ? ctx.moveTo(n.x,n.y) : ctx.lineTo(n.x,n.y);
    }
    ctx.stroke();
  }
  ctx.strokeStyle = curColor + "88";
  for (let s = 0; s < SPOKES; s++){
    ctx.beginPath(); ctx.moveTo(C.x, C.y);
    for (let r = 0; r < RINGS; r++){ const n = nodes[r*SPOKES + s]; ctx.lineTo(n.x, n.y); }
    ctx.stroke();
  }
  // nodes
  ctx.fillStyle = curColor;
  for (const n of nodes){
    ctx.beginPath(); ctx.arc(n.x, n.y, R*.012*(1+energy), 0, 7); ctx.fill();
  }
  // pulse crawling outward when speaking/thinking
  if (energy > .25){
    const pr = (t*1.6 % 1) * R;
    ctx.strokeStyle = curColor + "cc"; ctx.lineWidth = Math.max(1.5, R*.01);
    ctx.beginPath(); ctx.arc(C.x, C.y, pr, 0, 7); ctx.stroke();
  }
  // spidey lens eyes, tracking the mouse
  const ex = (mouse.x - .5) * R * .16, ey = (mouse.y - .5) * R * .16;
  const eyeW = R*.30, eyeH = R*.38, gap = R*.20;
  for (const side of [-1, 1]){
    const cx = C.x + side*gap + ex, cy = C.y - R*.02 + ey;
    ctx.save();
    ctx.translate(cx, cy); ctx.rotate(side * .35);
    ctx.beginPath(); ctx.ellipse(0, 0, eyeW/2, eyeH/2, 0, 0, 7);
    ctx.fillStyle = "#f4f1ea"; ctx.fill();
    ctx.lineWidth = Math.max(2, R*.02); ctx.strokeStyle = "#0e1226"; ctx.stroke();
    const blink = (Math.sin(t*.7) > .995) ? .12 : 1;   // rare blink
    ctx.beginPath(); ctx.ellipse(ex*.3, ey*.3, eyeW*.13, eyeH*.13*blink, 0, 0, 7);
    ctx.fillStyle = "#0e1226"; ctx.fill();
    ctx.restore();
  }
  requestAnimationFrame(tick);
}

function setMood(m){
  mood = m;
  curColor = moodColor[m];
  $("#state-word").textContent = m === "thinking" ? "THINKING" : m === "speaking" ? "TALKING" : "AWAKE";
  $("#state-word").style.color = curColor;
}

/* ---------------- boot ---------------- */
function boot(){
  size(); buildWeb(); tick();
  if (hasGsap && !reduced){
    gsap.from("#boot .letters b", { y:-160, rotation:-18, opacity:0, stagger:.13, ease:"back.out(2.2)", duration:.7 });
    gsap.from("#boot .tag", { opacity:0, letterSpacing:"1em", duration:1, delay:.6 });
    gsap.from("#wake", { scale:0, rotation:8, ease:"elastic.out(1,.45)", duration:1, delay:.9 });
  }
}
$("#wake").addEventListener("click", () => {
  const done = () => { $("#boot").style.display = "none"; $("#app").style.opacity = 1; greet(); };
  if (hasGsap && !reduced){
    gsap.to("#boot .letters b", { y:-90, opacity:0, stagger:.06, duration:.35, ease:"power3.in" });
    gsap.to("#boot", { opacity:0, duration:.5, delay:.3, onComplete: done });
    gsap.fromTo("#app", { opacity:0, y:24 }, { opacity:1, y:0, duration:.7, delay:.55 });
  } else done();
});

/* ---------------- chat ---------------- */
const feed = $("#feed"), inp = $("#inp"), send = $("#send");
let history = [];   // {role, content}
let busy = false;

function el(html){ const d = document.createElement("div"); d.innerHTML = html; return d.firstElementChild; }

function addUser(text){
  const m = el(`<div class="msg user"><div class="who">SUBHA</div><div class="body"></div></div>`);
  m.querySelector(".body").textContent = text;
  feed.appendChild(m);
  if (hasGsap && !reduced) gsap.from(m, { x:60, opacity:0, rotation:2, duration:.4, ease:"power3.out" });
  feed.scrollTop = feed.scrollHeight;
}

function addSuuu(text){
  const m = el(`<div class="msg suuu"><div class="who">SUUU</div><div class="body"></div></div>`);
  const body = m.querySelector(".body");
  const words = text.split(/(\s+)/);
  for (const w of words){
    if (/^\s+$/.test(w)) { body.appendChild(document.createTextNode(w)); continue; }
    const s = document.createElement("span"); s.className = "w"; s.textContent = w;
    body.appendChild(s);
  }
  feed.appendChild(m);
  const spans = m.querySelectorAll(".w");
  if (hasGsap && !reduced){
    gsap.to(spans, { opacity:1, y:0, stagger: Math.min(.03, 2.2/spans.length), duration:.3, ease:"power2.out",
      onUpdate: () => { feed.scrollTop = feed.scrollHeight; },
      onComplete: () => setMood("idle") });
  } else { spans.forEach(s => { s.style.opacity = 1; s.style.transform = "none"; }); setMood("idle"); }
  feed.scrollTop = feed.scrollHeight;
}

function addErr(text){
  feed.appendChild(el(`<div class="msg err"><div class="who" style="color:var(--red)">WEB SNAPPED</div><div class="body">${text}</div></div>`));
  feed.scrollTop = feed.scrollHeight;
}

let thinker = null;
function think(on){
  if (on){
    thinker = el(`<div class="msg suuu"><div class="who">SUUU</div><div class="think"><i></i><i></i><i></i></div></div>`);
    feed.appendChild(thinker); feed.scrollTop = feed.scrollHeight;
  } else if (thinker){ thinker.remove(); thinker = null; }
}

async function ask(text){
  busy = true; send.disabled = true;
  addUser(text);
  history.push({ role:"user", content:text });
  setMood("thinking"); think(true);
  try{
    const res = await fetch("/api/chat", {
      method:"POST", headers:{ "content-type":"application/json" },
      body: JSON.stringify({ messages: history, apiKey: localStorage.getItem("suuu-key") || undefined })
    });
    const data = await res.json();
    think(false);
    if (data.error) { addErr(data.error); setMood("idle"); }
    else {
      history.push({ role:"assistant", content:data.reply });
      setMood("speaking"); addSuuu(data.reply);
    }
  } catch(e){ think(false); addErr(e.message); setMood("idle"); }
  busy = false; send.disabled = false; inp.focus();
}

function submit(){
  const text = inp.value.trim();
  if (!text || busy) return;
  inp.value = ""; inp.style.height = "auto";
  ask(text);
}
send.addEventListener("click", submit);
inp.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey){ e.preventDefault(); submit(); } });
inp.addEventListener("input", () => { inp.style.height = "auto"; inp.style.height = inp.scrollHeight + "px"; });

function greet(){
  setMood("speaking");
  if (bridgeMode === "cli")
    addSuuu("Yo. I'm suuu — Fable's mind, living on your machine now. No API key, no cloud bill: I run on your Claude Code login. Ask me anything, bro. What are we building?");
  else if (bridgeMode === "key")
    addSuuu("Yo. I'm suuu — Subha's agent, awake and linked through your key. Ask me about his work, or let's build something. What's up?");
  else
    addSuuu("Yo. I'm suuu — Subha's agent. This is the hosted me, so I need one thing to fully wake: hit \"key optional ⚙\" below-left and drop an Anthropic API key (stays in your browser). Or run me locally with Claude Code — no key needed there.");
  inp.focus();
}

/* ---------------- status + key drawer ---------------- */
let bridgeMode = "none";   // cli | key | none
async function checkStatus(){
  const st = $("#status"), txt = $("#status-txt");
  const key = localStorage.getItem("suuu-key");
  try{
    const r = await fetch("/api/status"); const d = await r.json();
    if (key){ bridgeMode = "key"; st.className = "status ok"; txt.textContent = "API KEY MODE"; }
    else if (d.cli){ bridgeMode = "cli"; st.className = "status ok"; txt.textContent = "CLAUDE CODE LINKED · NO KEY"; }
    else if (d.hosted){ bridgeMode = "none"; st.className = "status bad"; txt.textContent = "HOSTED — ADD A KEY TO CHAT"; }
    else { bridgeMode = "none"; st.className = "status bad"; txt.textContent = "CLAUDE CODE NOT FOUND — ADD A KEY"; }
  } catch { bridgeMode = "none"; st.className = "status bad"; txt.textContent = "BRIDGE OFFLINE — RUN: node server.js"; }
}
$("#gear").addEventListener("click", () => {
  $("#keyInp").value = localStorage.getItem("suuu-key") || "";
  $("#drawer").classList.add("open");
});
$("#drawer").addEventListener("click", e => { if (e.target.id === "drawer") $("#drawer").classList.remove("open"); });
$("#saveKey").addEventListener("click", () => {
  const v = $("#keyInp").value.trim();
  if (v) localStorage.setItem("suuu-key", v);
  $("#drawer").classList.remove("open"); checkStatus();
});
$("#clearKey").addEventListener("click", () => {
  localStorage.removeItem("suuu-key");
  $("#drawer").classList.remove("open"); checkStatus();
});

boot(); checkStatus(); setInterval(checkStatus, 30000);
</script>
</body>
</html>
